document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

an style=\"width:7px; height:7px; border-radius:50%; background:#a9b3c2; animation:gpsDot 1s infinite;\"><\u002Fspan><span style=\"width:7px; height:7px; border-radius:50%; background:#a9b3c2; animation:gpsDot 1s infinite 0.15s;\"><\u002Fspan><span style=\"width:7px; height:7px; border-radius:50%; background:#a9b3c2; animation:gpsDot 1s infinite 0.3s;\"><\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"display:flex; gap:7px; overflow-x:auto; padding:12px 16px 4px;\">\n              <sc-for list=\"{{ chatChips }}\" as=\"q\" hint-placeholder-count=\"4\">\n                <div onclick=\"{{ q.onClick }}\" style=\"flex:none; font-size:11.5px; font-weight:600; color:#2a5fd0; background:#e8eefb; border-radius:99px; padding:7px 12px; cursor:pointer; white-space:nowrap;\">{{ q.label }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n        <\u002Fdiv>\n\n        <!-- CHAT INPUT -->\n        <sc-if value=\"{{ isChat }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:8px 14px; background:#fff; border-top:1px solid #e6e9f0; display:flex; align-items:center; gap:9px;\">\n            <input value=\"{{ chatInput }}\" onchange=\"{{ setChatInput }}\" onkeydown=\"{{ chatKey }}\" placeholder=\"Pregunta a tu CFO…\" style=\"flex:1; border:none; background:#eef1f6; border-radius:99px; padding:11px 16px; font-size:13px; color:#131c2b; outline:none;\">\n            <div onclick=\"{{ sendChat }}\" style=\"width:40px; height:40px; border-radius:50%; background:#2a5fd0; display:flex; align-items:center; justify-content:center; flex:none; cursor:pointer;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 18 18\" fill=\"none\"><path d=\"M2 9h12M9 4l5 5-5 5\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- TAB BAR -->\n        <div style=\"display:flex; background:rgba(255,255,255,0.96); border-top:1px solid #e6e9f0; padding:8px 6px 24px; backdrop-filter:blur(8px);\">\n          <div onclick=\"{{ goHome }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; color:{{ cHome }}; cursor:pointer;\">\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" fill=\"none\"><path d=\"M3 9l8-6 8 6v9a1 1 0 01-1 1h-4v-6H8v6H4a1 1 0 01-1-1V9z\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size:9.5px; font-weight:700;\">Inicio<\u002Fspan>\n          <\u002Fdiv>\n          <div onclick=\"{{ goForecast }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; color:{{ cForecast }}; cursor:pointer;\">\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" fill=\"none\"><path d=\"M3 15l5-5 3 3 7-8\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M14 5h4v4\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size:9.5px; font-weight:700;\">Flujo<\u002Fspan>\n          <\u002Fdiv>\n          <div onclick=\"{{ goSim }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; color:{{ cSim }}; cursor:pointer;\">\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" fill=\"none\"><path d=\"M5 4v14M17 4v14M5 9h0M17 13h0\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"5\" cy=\"9\" r=\"2.4\" stroke=\"currentColor\" stroke-width=\"1.8\"><\u002Fcircle><circle cx=\"17\" cy=\"13\" r=\"2.4\" stroke=\"currentColor\" stroke-width=\"1.8\"><\u002Fcircle><\u002Fsvg>\n            <span style=\"font-size:9.5px; font-weight:700;\">Simular<\u002Fspan>\n          <\u002Fdiv>\n          <div onclick=\"{{ goChat }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; color:{{ cChat }}; cursor:pointer;\">\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" fill=\"none\"><path d=\"M4 5h14a1 1 0 011 1v8a1 1 0 01-1 1H9l-4 3v-3H4a1 1 0 01-1-1V6a1 1 0 011-1z\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size:9.5px; font-weight:700;\">CFO IA<\u002Fspan>\n          <\u002Fdiv>\n          <div onclick=\"{{ goRisks }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; color:{{ cRisks }}; cursor:pointer;\">\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 22 22\" fill=\"none\"><path d=\"M11 3L2 18h18L11 3z\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M11 9v4M11 15h0\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size:9.5px; font-weight:700;\">Riesgos<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fx-import>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;482px&quot;,&quot;height&quot;:&quot;940px&quot;},&quot;startScreen&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;login&quot;,&quot;register&quot;,&quot;onboarding&quot;,&quot;app&quot;],&quot;default&quot;:&quot;login&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;demoData&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  chatRef = React.createRef();\n\n  DEMO = { name: 'Estudio Lumen', currency: 'USD', cash: 48250, revenue: 22400, expenses: 15900, topClientPct: 42, debt: 38000, receivables: 4200, taxDue: 1850, growth: 8 };\n\n  state = {\n    screen: 'login',\n    auth: { name: '', email: '', company: '' },\n    form: { email: '', password: '', name: '', company: '' },\n    authError: '',\n    draft: { name: '', cash: '', revenue: '', expenses: '', topClientPct: 30, debt: '', receivables: '', taxDue: '', growth: '' },\n    company: null,\n    view: 'home',\n    horizon: '90',\n    actions: {},\n    recsAI: { items: [], loading: false },\n    sim: { scenario: 'hire', magnitude: 2200 },\n    chat: { messages: [], input: '', loading: false },\n  };\n\n  // ---------- persistence ----------\n  KEY = 'gpsfin_state_v1';\n  componentDidMount() {\n    try {\n      const raw = localStorage.getItem(this.KEY);\n      if (raw) {\n        const s = JSON.parse(raw);\n        this.setState({\n          screen: s.screen || 'login',\n          auth: s.auth || this.state.auth,\n          company: s.company || null,\n          actions: s.actions || {},\n          chat: { messages: this.greeting(s.company), input: '', loading: false },\n        });\n        return;\n      }\n    } catch (e) {}\n    // initial from props\n    if (this.props.demoData) {\n      this.setState({ company: this.DEMO, screen: 'app', chat: { messages: this.greeting(this.DEMO), input: '', loading: false } });\n    } else if (this.props.startScreen && this.props.startScreen !== 'login') {\n      this.setState({ screen: this.props.startScreen });\n    }\n  }\n  persist() {\n    try {\n      localStorage.setItem(this.KEY, JSON.stringify({\n        screen: this.state.screen, auth: this.state.auth, company: this.state.company, actions: this.state.actions,\n      }));\n    } catch (e) {}\n  }\n  componentDidUpdate(pp, ps) {\n    if (ps.screen !== this.state.screen || ps.company !== this.state.company || ps.actions !== this.state.actions || ps.auth !== this.state.auth) this.persist();\n    if (this.state.view === 'chat' && this.chatRef.current) this.chatRef.current.scrollTop = this.chatRef.current.scrollHeight;\n  }\n\n  greeting(c) {\n    const name = (this.state && this.state.auth && this.state.auth.name) ? this.state.auth.name.split(' ')[0] : 'equipo';\n    return [{ role: 'assistant', content: 'Hola ' + name + ' 👋 Soy tu CFO virtual. Tengo tus datos financieros en tiempo real — pregúntame lo que quieras: cuánto puedes pagarte, si puedes contratar, tu mayor riesgo…' }];\n  }\n\n  // ---------- helpers ----------\n  fmt(n) { return Math.round(Math.abs(n)).toLocaleString('en-US'); }\n  money(n) { return (n < 0 ? '−$' : '$') + this.fmt(n); }\n  signed(n) { return (n >= 0 ? '+$' : '−$') + this.fmt(n); }\n  toneColor(t) { return { green: '#16a06a', amber: '#c98a16', red: '#d2453f' }[t]; }\n  toneBg(t) { return { green: '#e7f6ef', amber: '#fbf1dd', red: '#fbe9e8' }[t]; }\n  clamp(x) { return Math.max(0, Math.min(1, x)); }\n\n  computeModel(c) {\n    const revenue = +c.revenue || 0, expenses = +c.expenses || 0, cash = +c.cash || 0;\n    const topClientPct = +c.topClientPct || 0, debt = +c.debt || 0, growth = +c.growth || 0;\n    const taxDue = +c.taxDue || 0, receivables = +c.receivables || 0;\n    const profit = revenue - expenses;\n    const margin = revenue > 0 ? profit / revenue : 0;\n    const liquidity = expenses > 0 ? cash / expenses : (cash > 0 ? 12 : 0);\n    const annualRev = revenue * 12;\n    const debtRatio = annualRev > 0 ? debt / annualRev : 0;\n\n    const sMargin = this.clamp(margin / 0.30);\n    const sLiq = this.clamp(liquidity / 6);\n    const sConc = this.clamp((50 - topClientPct) / 40);\n    const sGrow = this.clamp((growth + 5) / 15);\n    const sDebt = this.clamp((0.5 - debtRatio) / 0.5);\n    const score = Math.max(1, Math.round(100 * (sMargin * 0.25 + sLiq * 0.25 + sConc * 0.20 + sGrow * 0.15 + sDebt * 0.15)));\n    const scoreLabel = score >= 80 ? 'EXCELENTE' : score >= 65 ? 'BUENA' : score >= 50 ? 'REGULAR' : 'FRÁGIL';\n    const scoreTone = score >= 65 ? 'green' : score >= 50 ? 'amber' : 'red';\n    const globalRisk = score >= 70 ? 'BAJO' : score >= 50 ? 'MEDIO' : 'ALTO';\n    const globalTone = score >= 70 ? 'green' : score >= 50 ? 'amber' : 'red';\n\n    const lvl = (good, mid, val, invert) => {\n      const v = invert ? val : val;\n      return v >= good ? (invert ? 'ALTO' : 'BAJO') : v >= mid ? 'MEDIO' : (invert ? 'BAJO' : 'ALTO');\n    };\n    const riskItems = [\n      { key: 'conc', name: 'Concentración de clientes', detail: '1 cliente = ' + topClientPct + '% de ingresos', level: topClientPct >= 40 ? 'ALTO' : topClientPct >= 25 ? 'MEDIO' : 'BAJO' },\n      { key: 'margin', name: 'Margen de beneficio', detail: 'Margen actual ' + Math.round(margin * 100) + '%', level: margin >= 0.2 ? 'BAJO' : margin >= 0.1 ? 'MEDIO' : 'ALTO' },\n      { key: 'liq', name: 'Liquidez', detail: liquidity.toFixed(1) + ' meses de colchón', level: liquidity >= 4 ? 'BAJO' : liquidity >= 2 ? 'MEDIO' : 'ALTO' },\n      { key: 'debt', name: 'Ratio de deuda', detail: debtRatio.toFixed(2) + ' sobre ingresos anuales', level: debtRatio <= 0.3 ? 'BAJO' : debtRatio <= 0.5 ? 'MEDIO' : 'ALTO' },\n      { key: 'growth', name: 'Crecimiento de ingresos', detail: (growth >= 0 ? '+' : '') + growth + '% mensual', level: growth >= 3 ? 'BAJO' : growth >= 0 ? 'MEDIO' : 'ALTO' },\n    ];\n    const sev = { ALTO: 0, MEDIO: 1, BAJO: 2 };\n    riskItems.sort((a, b) => sev[a.level] - sev[b.level]);\n\n    const recList = [];\n    if (taxDue > 0) recList.push({ id: 'tax', title: 'Aparta ' + this.money(taxDue) + ' para impuestos', sub: 'Obligación fiscal pendiente' });\n    if (receivables > 0) recList.push({ id: 'recv', title: 'Cobra la factura de ' + this.money(receivables), sub: 'Cuentas por cobrar pendientes' });\n    if (topClientPct >= 35) recList.push({ id: 'div', title: 'Diversifica tu cartera de clientes', sub: '1 cliente concentra el ' + topClientPct + '%' });\n    if (margin < 0.20) recList.push({ id: 'mgn', title: 'Recupera margen: revisa precios y gastos', sub: 'Margen actual ' + Math.round(margin * 100) + '%' });\n    if (liquidity < 3) recList.push({ id: 'liq', title: 'Refuerza tu colchón de liquidez', sub: 'Solo ' + liquidity.toFixed(1) + ' meses de gastos cubiertos' });\n    if (debtRatio > 0.4) recList.push({ id: 'debt', title: 'Reduce tu nivel de deuda', sub: 'Ratio ' + debtRatio.toFixed(2) + ' — vigila intereses' });\n    if (recList.length === 0) recList.push({ id: 'ok', title: 'Mantén el rumbo: tus finanzas están sanas', sub: 'Sigue monitorizando cada mes' });\n\n    return { revenue, expenses, cash, topClientPct, debt, growth, taxDue, receivables, profit, margin, liquidity, debtRatio, score, scoreLabel, scoreTone, globalRisk, globalTone, riskItems, recList };\n  }\n\n  project(c, h) {\n    const months = { '30': 1, '90': 3, '180': 6, '365': 12 }[h];\n    const g = (+c.growth || 0) / 100;\n    let cash = +c.cash || 0, net = (+c.revenue || 0) - (+c.expenses || 0);\n    const pts = [cash];\n    for (let i = 0; i < months; i++) { cash += net; net = net * (1 + g * 0.4); pts.push(cash); }\n    return pts;\n  }\n  delta(c, h) { const p = this.project(c, h); const base = p[0] || 1; return (p[p.length - 1] - base) / (Math.abs(base) || 1); }\n\n  buildPath(vals, w, h, pad) {\n    const min = Math.min(...vals), max = Math.max(...vals), range = (max - min) || 1, n = vals.length;\n    const pts = vals.map((v, i) => [(i / (n - 1)) * w, h - pad - ((v - min) / range) * (h - 2 * pad)]);\n    let line = 'M' + pts[0][0].toFixed(1) + ',' + pts[0][1].toFixed(1);\n    for (let i = 1; i < n; i++) line += ' L' + pts[i][0].toFixed(1) + ',' + pts[i][1].toFixed(1);\n    const area = line + ' L' + w + ',' + h + ' L0,' + h + ' Z';\n    return { line, area, end: pts[n - 1] };\n  }\n\n  simCfg = {\n    hire:  { label: '¿Puedo contratar?',         min: 1500, max: 4000,  step: 100, def: 2200, magLabel: 'Salario bruto/mes' },\n    equip: { label: '¿Comprar equipo?',          min: 2000, max: 20000, step: 500, def: 8000, magLabel: 'Coste único' },\n    raise: { label: '¿Subir salarios?',          min: 2,    max: 20,    step: 1,   def: 8,    magLabel: '% de subida', pct: true },\n    drop:  { label: '¿Y si bajan ingresos?',     min: 5,    max: 50,    step: 5,   def: 20,   magLabel: '% caída de ingresos', pct: true },\n    lose:  { label: '¿Pierdo mi mayor cliente?', min: 0,    max: 0,     step: 1,   def: 0,    magLabel: 'Cliente principal', fixed: true },\n    price: { label: '¿Subir precios?',           min: 5,    max: 25,    step: 5,   def: 10,   magLabel: '% subida de precio', pct: true },\n  };\n\n  computeSim() {\n    const m = this.computeModel(this.state.company || this.DEMO);\n    const b = { rev: m.revenue, exp: m.expenses, profit: m.profit, cash: m.cash };\n    const s = this.state.sim.scenario, mag = this.state.sim.magnitude, TR = 0.21;\n    let cash = 0, profit = 0, tax = 0, risk = 'MEDIO', tone = 'amber', verdict = '', note = '';\n    if (s === 'hire') {\n      const cost = mag * 1.32; profit = -cost; cash = -cost; tax = -cost * TR;\n      const np = b.profit + profit;\n      tone = np > 2500 ? 'green' : np > 500 ? 'amber' : 'red'; risk = tone === 'green' ? 'BAJO' : tone === 'amber' ? 'MEDIO' : 'ALTO';\n      verdict = np > 2500 ? 'Sí, puedes contratar' : np > 500 ? 'Posible, pero ajustado' : 'No recomendado ahora';\n      note = 'Tu beneficio quedaría en ' + this.money(np) + '/mes (coste con seg. social).';\n    } else if (s === 'equip') {\n      cash = -mag; profit = -mag / 36; tax = -mag * TR;\n      const liq = b.exp > 0 ? (b.cash - mag) / b.exp : 0;\n      tone = liq > 2.5 ? 'green' : liq > 1.5 ? 'amber' : 'red'; risk = tone === 'green' ? 'BAJO' : tone === 'amber' ? 'MEDIO' : 'ALTO';\n      verdict = liq > 1.5 ? 'Sí, con liquidez suficiente' : 'Riesgo de liquidez';\n      note = 'Liquidez tras la compra: ' + liq.toFixed(1) + ' meses. Deducible en impuestos.';\n    } else if (s === 'raise') {\n      const inc = b.exp * 0.45 * (mag / 100); profit = -inc; cash = -inc; tax = -inc * TR;\n      const np = b.profit - inc;\n      tone = np > 3000 ? 'green' : np > 1000 ? 'amber' : 'red'; risk = tone === 'green' ? 'BAJO' : tone === 'amber' ? 'MEDIO' : 'ALTO';\n      verdict = np > 1000 ? 'Asumible' : 'Aprieta demasiado el margen';\n      note = 'Beneficio resultante: ' + this.money(np) + '/mes.';\n    } else if (s === 'drop') {\n      const rd = b.rev * (mag / 100); profit = -rd; cash = -rd; tax = -rd * TR;\n      const np = b.profit - rd;\n      tone = np > 2000 ? 'amber' : 'red'; risk = np > 2000 ? 'MEDIO' : np > 0 ? 'ALTO' : 'CRÍTICO';\n      verdict = np > 2000 ? 'Lo aguantarías' : np > 0 ? 'Margen muy fino' : 'Entrarías en pérdidas';\n      note = 'Beneficio resultante: ' + this.money(np) + '/mes.';\n    } else if (s === 'lose') {\n      const pct = (this.state.company || this.DEMO).topClientPct || 42;\n      const cl = b.rev * (pct / 100); profit = -cl; cash = -cl; tax = -cl * TR;\n      const np = b.profit - cl;\n      tone = 'red'; risk = np >= 0 ? 'ALTO' : 'CRÍTICO';\n      verdict = np >= 0 ? 'Margen crítico' : 'Entrarías en pérdidas graves';\n      note = 'Beneficio: ' + this.money(np) + '/mes. Diversifica tu cartera de clientes ya.';\n    } else {\n      const pr = b.rev * (mag / 100) * 0.85; profit = pr; cash = pr; tax = pr * TR;\n      const np = b.profit + pr;\n      tone = 'green'; risk = 'BAJO';\n      verdict = 'Mejora tu beneficio';\n      note = 'Beneficio resultante: ' + this.money(np) + '/mes (asumiendo algo de fuga).';\n    }\n    return { cash, profit, tax, risk, tone, verdict, note };\n  }\n\n  // ---------- navigation / auth ----------\n  go(v) { this.setState({ view: v }); }\n  setForm(k, val) { this.setState(s => ({ form: { ...s.form, [k]: val }, authError: '' })); }\n\n  doLogin() {\n    const f = this.state.form;\n    if (!f.email.trim() || !f.password.trim()) { this.setState({ authError: 'Introduce tu correo y contraseña.' }); return; }\n    const next = this.state.company ? 'app' : 'onboarding';\n    const auth = { ...this.state.auth, email: f.email, name: this.state.auth.name || f.email.split('@')[0] };\n    this.setState({ auth, screen: next, view: 'home', chat: { messages: this.greeting(this.state.company), input: '', loading: false } });\n  }\n  doRegister() {\n    const f = this.state.form;\n    if (!f.name.trim() || !f.company.trim()) { this.setState({ authError: 'Indica tu nombre y el de tu empresa.' }); return; }\n    if (!f.email.trim() || f.password.length < 6) { this.setState({ authError: 'Correo válido y contraseña de 6+ caracteres.' }); return; }\n    this.setState(s => ({\n      auth: { name: f.name, email: f.email, company: f.company },\n      draft: { ...s.draft, name: f.company },\n      screen: 'onboarding', authError: '',\n    }));\n  }\n  enterDemo() {\n    this.setState({ auth: { name: 'Marina Soto', email: 'marina@estudiolumen.com', company: 'Estudio Lumen' }, company: this.DEMO, screen: 'app', view: 'home', actions: {}, recsAI: { items: [], loading: false }, chat: { messages: this.greeting(this.DEMO), input: '', loading: false } });\n  }\n  logout() {\n    try { localStorage.removeItem(this.KEY); } catch (e) {}\n    this.setState({ screen: 'login', company: null, auth: { name: '', email: '', company: '' }, form: { email: '', password: '', name: '', company: '' }, actions: {}, recsAI: { items: [], loading: false } });\n  }\n  goEdit() {\n    const c = this.state.company || this.DEMO;\n    this.setState({ screen: 'onboarding', draft: { name: c.name, cash: String(c.cash), revenue: String(c.revenue), expenses: String(c.expenses), topClientPct: c.topClientPct, debt: String(c.debt), receivables: String(c.receivables), taxDue: String(c.taxDue), growth: String(c.growth) } });\n  }\n  setDraft(k, val) { this.setState(s => ({ draft: { ...s.draft, [k]: val } })); }\n  loadDemoDraft() {\n    const d = this.DEMO;\n    this.setState({ draft: { name: d.name, cash: String(d.cash), revenue: String(d.revenue), expenses: String(d.expenses), topClientPct: d.topClientPct, debt: String(d.debt), receivables: String(d.receivables), taxDue: String(d.taxDue), growth: String(d.growth) } });\n  }\n  parseDraft() {\n    const d = this.state.draft;\n    return { name: d.name || this.state.auth.company || 'Mi empresa', currency: 'USD', cash: +d.cash || 0, revenue: +d.revenue || 0, expenses: +d.expenses || 0, topClientPct: +d.topClientPct || 0, debt: +d.debt || 0, receivables: +d.receivables || 0, taxDue: +d.taxDue || 0, growth: +d.growth || 0 };\n  }\n  completeOnboarding() {\n    const c = this.parseDraft();\n    this.setState({ company: c, screen: 'app', view: 'home', actions: {}, recsAI: { items: [], loading: false }, chat: { messages: this.greeting(c), input: '', loading: false } });\n  }\n  toggle(id) { this.setState(s => ({ actions: { ...s.actions, [id]: !s.actions[id] } })); }\n\n  // ---------- CFO context ----------\n  cfoContext() {\n    const c = this.state.company || this.DEMO, m = this.computeModel(c);\n    return 'Eres el CFO virtual de \"' + c.name + '\" (moneda USD). Datos actuales reales: caja ' + this.money(m.cash) + '; ingresos ' + this.money(m.revenue) + '/mes; gastos ' + this.money(m.expenses) + '/mes; beneficio neto ' + this.money(m.profit) + '/mes (margen ' + Math.round(m.margin * 100) + '%); liquidez ' + m.liquidity.toFixed(1) + ' meses; salud financiera ' + m.score + '/100; riesgo global ' + m.globalRisk + '. Mayor cliente concentra el ' + m.topClientPct + '% de ingresos. Impuestos pendientes ' + this.money(m.taxDue) + '. Facturas por cobrar ' + this.money(m.receivables) + '. Deuda ' + this.money(m.debt) + '. ';\n  }\n  clean(t) { return String(t).replace(/^#+\\s*/gm, '').replace(/\\*\\*(.*?)\\*\\*/g, '$1').replace(/\\*(.*?)\\*/g, '$1').replace(/^[-•\\d.]+\\s*/gm, '').trim(); }\n\n  async send(text) {\n    const t = (text || '').trim();\n    if (!t || this.state.chat.loading) return;\n    const msgs = [...this.state.chat.messages, { role: 'user', content: t }];\n    this.setState({ view: 'chat', screen: 'app', chat: { ...this.state.chat, messages: msgs, input: '', loading: true } });\n    const prompt = this.cfoContext() + 'Responde como un CFO experto y cercano, SIEMPRE en español, claro y accionable, máximo 4 frases, usando estos datos. Texto plano conversacional: NO uses markdown, encabezados, asteriscos ni viñetas. Pregunta del usuario: ' + t;\n    let reply;\n    try {\n      if (window.claude && window.claude.complete) reply = await window.claude.complete({ messages: [{ role: 'user', content: prompt }] });\n      else reply = this.fallback(t);\n    } catch (e) { reply = this.fallback(t); }\n    reply = this.clean(reply);\n    this.setState(s => ({ chat: { ...s.chat, messages: [...s.chat.messages, { role: 'assistant', content: reply }], loading: false } }));\n  }\n  fallback(t) {\n    const m = this.computeModel(this.state.company || this.DEMO), q = t.toLowerCase();\n    if (q.includes('pagar')) return 'Con ' + this.money(m.profit) + '/mes de beneficio y ' + m.liquidity.toFixed(1) + ' meses de liquidez, podrías pagarte de forma sostenible dejando siempre 3 meses de gastos de colchón antes de subirlo.';\n    if (q.includes('contrat')) return 'Un sueldo nuevo de ~$2,200 (≈$2,900 con seg. social) dejaría tu beneficio en ' + this.money(m.profit - 2900) + '/mes. Asegura antes 1-2 clientes para reducir la dependencia del ' + m.topClientPct + '%.';\n    if (q.includes('riesgo')) return m.riskItems[0].name + ' es tu mayor riesgo (' + m.riskItems[0].detail + '). Prioriza reducirlo para estabilizar tu salud financiera de ' + m.score + '/100.';\n    if (q.includes('margen')) return 'Tu margen está en ' + Math.round(m.margin * 100) + '%. Revisa tus mayores gastos y considera subir precios un 5-10% en tus servicios de mayor demanda para recuperarlo.';\n    return 'Con tus datos (caja ' + this.money(m.cash) + ', beneficio ' + this.money(m.profit) + '/mes, liquidez ' + m.liquidity.toFixed(1) + ' meses) tu salud es ' + m.score + '/100. Vigila ' + m.riskItems[0].name.toLowerCase() + '. ¿Quieres que simule un escenario?';\n  }\n\n  async genRecs() {\n    if (this.state.recsAI.loading) return;\n    this.setState(s => ({ recsAI: { ...s.recsAI, loading: true } }));\n    const prompt = this.cfoContext() + 'Genera EXACTAMENTE 3 recomendaciones financieras personalizadas, accionables y priorizadas para ESTA empresa según sus datos. Cada recomendación en una sola línea, empezando por un verbo en imperativo, concreta y con cifras cuando aplique. Español, sin markdown, sin numeración, sin viñetas. Separa cada recomendación con un salto de línea.';\n    let items;\n    try {\n      let reply;\n      if (window.claude && window.claude.complete) reply = await window.claude.complete({ messages: [{ role: 'user', content: prompt }] });\n      else reply = null;\n      if (reply) items = String(reply).split('\\n').map(l => this.clean(l)).filter(l => l.length > 4).slice(0, 3);\n    } catch (e) {}\n    if (!items || items.length === 0) {\n      const m = this.computeModel(this.state.company || this.DEMO);\n      items = m.recList.slice(0, 3).map(r => r.title + ' — ' + r.sub.toLowerCase() + '.');\n      while (items.length < 3) items.push('Revisa tus gastos recurrentes y renegocia los contratos de mayor importe.');\n    }\n    this.setState({ recsAI: { items, loading: false } });\n  }\n\n  renderVals() {\n    const v = this.state.view, scr = this.state.screen;\n    const blue = '#2a5fd0', muted = '#8a93a3';\n    const f = this.state.form, d = this.state.draft;\n\n    // preview model for onboarding\n    const pv = this.computeModel(this.parseDraft());\n\n    // app model\n    const c = this.state.company || this.DEMO;\n    const m = this.computeModel(c);\n    const homeActive = (v === 'home' || v === 'where' || v === 'actions');\n\n    // gauge marker\n    const fScore = m.score / 100, a = Math.PI * (1 - fScore);\n    const gaugeX = (130 + 104 * Math.cos(a)).toFixed(1), gaugeY = (130 - 104 * Math.sin(a)).toFixed(1);\n\n    // where bars\n    const g = (m.growth || 0) / 100;\n    const rawBars = [];\n    for (let i = 5; i >= 0; i--) rawBars.push({ rev: m.revenue * Math.pow(1 + g, -i), exp: m.expenses * (0.95 + 0.012 * (5 - i)) });\n    const maxBar = Math.max(...rawBars.map(b => Math.max(b.rev, b.exp))) || 1;\n    const months = ['E', 'F', 'M', 'A', 'M', 'J'];\n    const bars = rawBars.map((b, i) => ({ rev: Math.round((b.rev / maxBar) * 70) + 'px', exp: Math.round((b.exp / maxBar) * 70) + 'px', label: months[i], color: i === 5 ? '#131c2b' : '#8a93a3', weight: i === 5 ? '700' : '400' }));\n\n    const catDefs = [['Nóminas', 0.45, '#2a5fd0'], ['Marketing', 0.18, '#3f7fe8'], ['Software', 0.15, '#16a06a'], ['Alquiler y otros', 0.22, '#c98a16']];\n    const categories = catDefs.map(([name, pct, color]) => ({ name, amount: this.money(m.expenses * pct), width: Math.round(pct * 100) + '%', color }));\n\n    // forecast\n    const h = this.state.horizon;\n    const fp = this.buildPath(this.project(c, h), 320, 120, 14);\n    const hLabel = { '30': '30 días', '90': '90 días', '180': '180 días', '365': '365 días' }[h];\n    const projEnd = this.project(c, h); const projCashVal = projEnd[projEnd.length - 1];\n    const dlt = this.delta(c, h);\n    const projDelta = (dlt >= 0 ? '+' : '') + Math.round(dlt * 100) + '%';\n    const hPos = { '30': '0%', '90': '25%', '180': '50%', '365': '75%' }[h];\n\n    const obligRaw = [];\n    if (m.taxDue > 0) obligRaw.push({ name: 'Impuestos pendientes', value: '−' + this.money(m.taxDue), color: '#c98a16' });\n    obligRaw.push({ name: 'Nóminas (estimado)', value: '−' + this.money(m.expenses * 0.45) + ' · mensual', color: '#5a6677' });\n    obligRaw.push({ name: 'Suscripciones SaaS (est.)', value: '−' + this.money(m.expenses * 0.15) + ' · mensual', color: '#5a6677' });\n    if (m.debt > 0) obligRaw.push({ name: 'Servicio de deuda', value: '−' + this.money(m.debt * 0.02) + ' · mensual', color: '#5a6677' });\n    const obligations = obligRaw.map((o, i) => ({ ...o, last: i === obligRaw.length - 1, notLast: i !== obligRaw.length - 1 }));\n\n    // risks\n    const riskRows = m.riskItems.map(r => ({ name: r.name, detail: r.detail, level: r.level, color: this.toneColor({ ALTO: 'red', MEDIO: 'amber', BAJO: 'green' }[r.level]) }));\n    const topRisk = m.riskItems[0];\n\n    // actions\n    const recRows = m.recList.map(r => {\n      const done = !!this.state.actions[r.id];\n      return { title: r.title, sub: r.sub, done, box: done ? '#2a5fd0' : 'transparent', deco: done ? 'line-through' : 'none', op: done ? '0.45' : '1', toggle: () => this.toggle(r.id) };\n    });\n    const doneCount = m.recList.filter(r => this.state.actions[r.id]).length;\n    const total = m.recList.length;\n    const recsAI = this.state.recsAI.items.map((text, i) => ({ n: i + 1, text }));\n\n    // sim\n    const cfg = this.simCfg[this.state.sim.scenario];\n    const r = this.computeSim();\n    const chips = Object.keys(this.simCfg).map(k => {\n      const on = k === this.state.sim.scenario;\n      return { label: this.simCfg[k].label, onClick: () => this.setState({ sim: { scenario: k, magnitude: this.simCfg[k].def } }), bg: on ? '#2a5fd0' : '#fff', color: on ? '#fff' : '#131c2b', border: on ? '#2a5fd0' : '#e6e9f0' };\n    });\n    const magShow = cfg.pct ? this.state.sim.magnitude + '%' : '$' + this.fmt(this.state.sim.magnitude);\n\n    // chat\n    const chatRows = this.state.chat.messages.map(mm => ({ content: mm.content, align: mm.role === 'user' ? 'flex-end' : 'flex-start', bg: mm.role === 'user' ? '#2a5fd0' : '#fff', color: mm.role === 'user' ? '#fff' : '#131c2b' }));\n    const quicks = ['¿Cuánto puedo pagarme?', '¿Puedo contratar el mes que viene?', '¿Cuál es mi mayor riesgo?', '¿Por qué baja mi margen?'];\n    const chatChips = quicks.map(label => ({ label, onClick: () => this.send(label) }));\n\n    return {\n      // screens\n      isLogin: scr === 'login', isRegister: scr === 'register', isOnboarding: scr === 'onboarding', isApp: scr === 'app',\n      // auth form\n      fEmail: f.email, fPass: f.password, fName: f.name, fCompany: f.company,\n      setEmail: (e) => this.setForm('email', e.target.value), setPass: (e) => this.setForm('password', e.target.value),\n      setName: (e) => this.setForm('name', e.target.value), setCompany: (e) => this.setForm('company', e.target.value),\n      authError: !!this.state.authError, authErrorMsg: this.state.authError,\n      doLogin: () => this.doLogin(), doRegister: () => this.doRegister(), enterDemo: () => this.enterDemo(),\n      goRegister: () => this.setState({ screen: 'register', authError: '' }), goLogin: () => this.setState({ screen: 'login', authError: '' }),\n\n      // onboarding\n      hasCompany: !!this.state.company,\n      onbTitle: this.state.company ? 'Editar mis finanzas' : 'Registra tus finanzas',\n      onbCta: this.state.company ? 'Recalcular mi GPS' : 'Calcular mi GPS',\n      pvScore: pv.score, pvLabel: pv.scoreLabel, pvColor: this.toneColor(pv.scoreTone) === '#16a06a' ? '#5fd0a0' : (pv.scoreTone === 'amber' ? '#e3b341' : '#ff8e88'),\n      dName: d.name, dCash: d.cash, dRevenue: d.revenue, dExpenses: d.expenses, dTopClientPct: d.topClientPct, dDebt: d.debt, dReceivables: d.receivables, dTaxDue: d.taxDue, dGrowth: d.growth,\n      setDName: (e) => this.setDraft('name', e.target.value), setDCash: (e) => this.setDraft('cash', e.target.value), setDRevenue: (e) => this.setDraft('revenue', e.target.value), setDExpenses: (e) => this.setDraft('expenses', e.target.value), setDTopClient: (e) => this.setDraft('topClientPct', +e.target.value), setDDebt: (e) => this.setDraft('debt', e.target.value), setDReceivables: (e) => this.setDraft('receivables', e.target.value), setDTaxDue: (e) => this.setDraft('taxDue', e.target.value), setDGrowth: (e) => this.setDraft('growth', e.target.value),\n      loadDemoDraft: () => this.loadDemoDraft(), completeOnboarding: () => this.completeOnboarding(), logout: () => this.logout(),\n\n      // nav\n      isHome: v === 'home', isWhere: v === 'where', isForecast: v === 'forecast', isRisks: v === 'risks', isActions: v === 'actions', isSim: v === 'simulator', isChat: v === 'chat',\n      goHome: () => this.go('home'), goWhere: () => this.go('where'), goForecast: () => this.go('forecast'), goRisks: () => this.go('risks'), goActions: () => this.go('actions'), goSim: () => this.go('simulator'), goChat: () => this.go('chat'), goEdit: () => this.goEdit(),\n      cHome: homeActive ? blue : muted, cForecast: v === 'forecast' ? blue : muted, cSim: v === 'simulator' ? blue : muted, cChat: v === 'chat' ? blue : muted, cRisks: v === 'risks' ? blue : muted,\n\n      // home values\n      companyName: c.name, currency: c.currency,\n      score: m.score, scoreLabel: m.scoreLabel, gaugeX, gaugeY,\n      cashFmt: this.money(m.cash), profitFmt: this.money(m.profit), profitColor: m.profit >= 0 ? '#5fd0a0' : '#ff8e88',\n      liqFmt: m.liquidity.toFixed(1) + 'm', liqColor: m.liquidity >= 4 ? '#5fd0a0' : m.liquidity >= 2 ? '#e3b341' : '#ff8e88',\n      delta90: (this.delta(c, '90') >= 0 ? '+' : '') + Math.round(this.delta(c, '90') * 100) + '%', delta90Color: this.delta(c, '90') >= 0 ? '#16a06a' : '#d2453f',\n      globalRisk: m.globalRisk, globalRiskColor: this.toneColor(m.globalTone), globalRiskBg: this.toneBg(m.globalTone),\n      actionsLeft: total - doneCount,\n      topRiskText: 'Riesgo principal: ' + topRisk.name.toLowerCase() + ' · ' + topRisk.detail, topRiskColor: this.toneColor({ ALTO: 'red', MEDIO: 'amber', BAJO: 'green' }[topRisk.level]),\n\n      // where\n      revenueFmt: this.money(m.revenue), expensesFmt: this.money(m.expenses), marginPct: Math.round(m.margin * 100) + '%',\n      growthFmt: (m.growth >= 0 ? '+' : '') + m.growth + '% crecimiento', expRatio: m.revenue > 0 ? Math.round((m.expenses / m.revenue) * 100) + '%' : '—',\n      liqFull: m.liquidity.toFixed(1) + ' meses', liqTag: m.liquidity >= 4 ? 'Saludable' : m.liquidity >= 2 ? 'Vigilar' : 'Bajo',\n      bars, categories,\n\n      // forecast\n      indLeft: hPos, horizLabel: hLabel, projCash: this.money(projCashVal), projDelta, projDeltaColor: dlt >= 0 ? '#16a06a' : '#d2453f', projDeltaBg: dlt >= 0 ? '#e7f6ef' : '#fbe9e8',\n      setH30: () => this.setState({ horizon: '30' }), setH90: () => this.setState({ horizon: '90' }), setH180: () => this.setState({ horizon: '180' }), setH365: () => this.setState({ horizon: '365' }),\n      fLine: fp.line, fArea: fp.area, fEndX: fp.end[0].toFixed(1), fEndY: fp.end[1].toFixed(1),\n      obligations,\n\n      // risks\n      riskRows, askRisk: () => this.send('¿Cómo reduzco mi mayor riesgo, ' + topRisk.name.toLowerCase() + '?'),\n\n      // actions\n      actionsProgress: doneCount + ' de ' + total + ' completadas', actionsPct: Math.round((doneCount / total) * 100) + '%',\n      recRows,\n      hasRecsAI: recsAI.length > 0, noRecsAI: recsAI.length === 0, recsAI, recsLoading: this.state.recsAI.loading, recsIdle: !this.state.recsAI.loading,\n      genRecs: () => this.genRecs(),\n\n      // sim\n      simChips: chips, showSlider: !cfg.fixed, magLabel: cfg.magLabel, magShow, magMin: cfg.min, magMax: cfg.max, magStep: cfg.step, magVal: this.state.sim.magnitude,\n      setMag: (e) => this.setState({ sim: { ...this.state.sim, magnitude: +e.target.value } }),\n      simVerdict: r.verdict, simVerdictColor: this.toneColor(r.tone), simVerdictBg: this.toneBg(r.tone), simNote: r.note,\n      simCash: this.signed(r.cash), simCashColor: r.cash >= 0 ? '#16a06a' : '#d2453f', simProfit: this.signed(r.profit), simProfitColor: r.profit >= 0 ? '#16a06a' : '#d2453f',\n      simTax: this.signed(r.tax), simRisk: r.risk, simRiskColor: this.toneColor(r.tone),\n      askSim: () => this.send('Estoy evaluando el escenario \"' + cfg.label + '\" con un valor de ' + magShow + '. ¿Qué me recomiendas?'),\n\n      // chat\n      chatRows, chatChips, chatLoading: this.state.chat.loading, chatInput: this.state.chat.input, chatRefObj: this.chatRef,\n      setChatInput: (e) => this.setState(s => ({ chat: { ...s.chat, input: e.target.value } })), chatKey: (e) => { if (e.key === 'Enter') this.send(this.state.chat.input); }, sendChat: () => this.send(this.state.chat.input),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
